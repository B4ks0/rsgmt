version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: rsg_mysql
    restart: always
    environment:
      MYSQL_DATABASE: rsgumato
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: rsg_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=rsgumato
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db
      - DB_PORT=3306
      - DEBUG=1
    depends_on:
      - db

volumes:
  mysql_data:
