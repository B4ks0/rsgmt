
<style>
#erd svg { max-width: 100%; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div style="padding: 8px 0 4px;">
  <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;">Klik tabel untuk detail — scroll untuk melihat seluruh diagram</div>
  <div id="erd"></div>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a3a' : '#eeedfe',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#c2c0b6' : '#3C3489',
    secondaryColor: dark ? '#1a2a2a' : '#e1f5ee',
    tertiaryColor: dark ? '#2a1a1a' : '#faece7',
  },
});

const diagram = `erDiagram
  PATIENTS {
    uuid id PK
    string full_name
    string email
    string phone
    date date_of_birth
    string gender
    string blood_type
    string address
    string national_id
    timestamp created_at
    timestamp updated_at
  }

  DOCTORS {
    uuid id PK
    string full_name
    string email
    string phone
    string license_number
    int specialization_id FK
    int department_id FK
    string photo_url
    int experience_years
    boolean is_active
    timestamp created_at
  }

  SPECIALIZATIONS {
    int id PK
    string name
    string description
    string icon_url
  }

  DEPARTMENTS {
    int id PK
    string name
    string location
    string phone
    int floor_number
  }

  DOCTOR_SCHEDULES {
    uuid id PK
    uuid doctor_id FK
    int day_of_week
    time start_time
    time end_time
    int slot_duration_min
    int max_patients
    boolean is_active
  }

  SCHEDULE_EXCEPTIONS {
    uuid id PK
    uuid doctor_id FK
    date exception_date
    string reason
    boolean is_available
  }

  APPOINTMENTS {
    uuid id PK
    uuid patient_id FK
    uuid doctor_id FK
    uuid schedule_id FK
    date appointment_date
    time appointment_time
    string queue_number
    string status
    string type
    string chief_complaint
    string notes
    timestamp booked_at
    timestamp updated_at
  }

  APPOINTMENT_HISTORY {
    uuid id PK
    uuid appointment_id FK
    string old_status
    string new_status
    string changed_by
    string reason
    timestamp changed_at
  }

  MEDICAL_RECORDS {
    uuid id PK
    uuid appointment_id FK
    uuid patient_id FK
    uuid doctor_id FK
    string diagnosis
    string treatment
    string prescription
    string lab_results
    string notes
    timestamp created_at
  }

  PAYMENTS {
    uuid id PK
    uuid appointment_id FK
    decimal amount
    string payment_method
    string status
    string transaction_id
    string invoice_number
    timestamp paid_at
    timestamp created_at
  }

  NOTIFICATIONS {
    uuid id PK
    uuid patient_id FK
    uuid appointment_id FK
    string type
    string channel
    string message
    boolean is_read
    timestamp sent_at
  }

  REVIEWS {
    uuid id PK
    uuid appointment_id FK
    uuid patient_id FK
    uuid doctor_id FK
    int rating
    string comment
    boolean is_published
    timestamp created_at
  }

  PATIENTS ||--o{ APPOINTMENTS : "books"
  DOCTORS ||--o{ APPOINTMENTS : "handles"
  DOCTORS ||--o{ DOCTOR_SCHEDULES : "has"
  DOCTORS ||--o{ SCHEDULE_EXCEPTIONS : "sets"
  SPECIALIZATIONS ||--o{ DOCTORS : "classifies"
  DEPARTMENTS ||--o{ DOCTORS : "belongs to"
  DOCTOR_SCHEDULES ||--o{ APPOINTMENTS : "slots"
  APPOINTMENTS ||--o{ APPOINTMENT_HISTORY : "logs"
  APPOINTMENTS ||--|| MEDICAL_RECORDS : "generates"
  APPOINTMENTS ||--o| PAYMENTS : "billed as"
  APPOINTMENTS ||--o{ NOTIFICATIONS : "triggers"
  APPOINTMENTS ||--o| REVIEWS : "receives"
  PATIENTS ||--o{ REVIEWS : "writes"
  DOCTORS ||--o{ REVIEWS : "rated in"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
