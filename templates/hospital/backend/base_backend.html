{% load static %}
<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Backend - RS Gunung Maria{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      html {
        background-color: #f8f9fa;
      }

      body {
        background-color: #f8f9fa;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        zoom: 0.7;
      }

      .sidebar {
        min-height: calc(100vh / 0.7) !important;
        background-color: #212529;
        color: #fff;
        box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      }

      .main-content {
        height: calc(100vh / 0.7) !important;
      }

      .sidebar-brand {
        font-size: 1.25rem;
        font-weight: 700;
        padding: 1.5rem;
        letter-spacing: 0.5px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 1rem;
      }

      .sidebar a {
        color: #e9ecef;
        text-decoration: none;
        padding: 12px 20px;
        display: block;
        font-size: 0.95rem;
        transition: all 0.2s;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background-color: #0d6efd;
        color: #fff;
        border-radius: 0 20px 20px 0;
        margin-right: 15px;
      }

      .sidebar-heading {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 1px;
        color: #adb5bd;
        padding: 0 1.25rem;
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
      }

      .card-stat {
        border: none;
        border-left: 5px solid #0d6efd;
        border-radius: 10px;
      }

      /* Fix Modal Backdrop - Full Viewport Coverage */
      html {
        overflow: visible !important;
      }

      body {
        overflow: visible !important;
      }

      .modal {
        --bs-backdrop-zindex: 1050;
        --bs-modal-zindex: 1060;
      }

      .modal-backdrop {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        z-index: 1050 !important;
        width: 100% !important;
        height: 100% !important;
        background-color: rgba(0, 0, 0, 0.5) !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .modal-backdrop.show {
        opacity: 1 !important;
        display: block !important;
      }

      .modal.show {
        z-index: 1060 !important;
        display: block !important;
        padding: 0 !important;
        overflow: visible !important;
      }

      /* Prevent parent container from restricting modal stacking */
      .main-content {
        transform: none !important;
        will-change: auto !important;
        z-index: auto !important;
        position: relative;
      }

      /* ── Toast Stack ──────────────────────────────── */
      .toast-stack {
        position: fixed;
        top: 0;
        right: 0;
        padding: 1.1rem;
        z-index: 1080;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 400px;
        pointer-events: none;
      }
      .toast-item {
        pointer-events: all;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 28px rgba(0,0,0,0.18);
        animation: toastIn 0.32s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
      }
      .toast-item.toast-removing {
        animation: toastOut 0.22s ease-in forwards !important;
      }
      @keyframes toastIn {
        from { transform: translateX(110%); opacity: 0; }
        to   { transform: translateX(0);   opacity: 1; }
      }
      @keyframes toastOut {
        to { transform: translateX(110%); opacity: 0; }
      }
      .toast-progress {
        height: 3px;
        transform-origin: left;
        animation: toastProgress linear forwards;
      }
      @keyframes toastProgress {
        from { transform: scaleX(1); }
        to   { transform: scaleX(0); }
      }
      /* ───────────────────────────────────────────── */

      {% block extra_css %}{% endblock %}
    </style>
  </head>

  <body>
    <div class="d-flex">
      <!-- Sidebar Navigation -->
      {% include "hospital/backend/includes/_sidebar.html" %}

      <!-- Main Content Area -->
      <div class="flex-grow-1 main-content p-3 p-md-5 overflow-auto" style="height: 100vh;">
        <!-- Mobile header -->
        <div
          class="d-md-none d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom"
        >
          <h5 class="mb-0 fw-bold">
            <i class="bi bi-hospital text-primary me-1"></i> RSGM Backend
          </h5>
          <a href="{% url 'home' %}" class="btn btn-sm btn-outline-secondary"
            >Website</a
          >
        </div>

        <!-- Toast Stack (managed by ToastManager JS below) -->
        <div id="toastStack" class="toast-stack"></div>

        <!-- Page Content -->
        {% block content %}{% endblock %}
      </div>
    </div>

    <!-- Modal container block — rendered outside page content so Bootstrap overlay works correctly -->
    {% block modals %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
      /* ── ToastManager ──────────────────────────────────────────────────── */
      const ToastManager = (function () {
        const MAX = 3;
        const TYPES = {
          success: { icon: 'bi-check-circle-fill',        bg: 'bg-success', text: 'text-white', cw: true,  bar: 'rgba(255,255,255,0.35)' },
          danger:  { icon: 'bi-exclamation-triangle-fill', bg: 'bg-danger',  text: 'text-white', cw: true,  bar: 'rgba(255,255,255,0.35)' },
          warning: { icon: 'bi-exclamation-circle-fill',   bg: 'bg-warning', text: 'text-dark',  cw: false, bar: 'rgba(0,0,0,0.15)'       },
          info:    { icon: 'bi-info-circle-fill',           bg: 'bg-info',    text: 'text-white', cw: true,  bar: 'rgba(255,255,255,0.35)' },
        };

        let container;

        function init() { container = document.getElementById('toastStack'); }

        function esc(s) {
          const d = document.createElement('div');
          d.textContent = s;
          return d.innerHTML;
        }

        function animateOut(el, cb) {
          el.classList.add('toast-removing');
          el.addEventListener('animationend', function () {
            if (el.parentNode) el.remove();
            if (cb) cb();
          }, { once: true });
        }

        function show(opts) {
          const type = opts.type || 'info';
          const t = TYPES[type] || TYPES.info;
          const dur = opts.duration || (opts.hasUndo ? 7000 : 8000);

          // Evict the oldest (bottom) if at max
          const items = container.querySelectorAll('.toast-item');
          if (items.length >= MAX) animateOut(items[items.length - 1]);

          const el = document.createElement('div');
          el.className = 'toast-item';
          el.innerHTML =
            '<div class="' + t.bg + ' ' + t.text + '">' +
              '<div class="d-flex align-items-start gap-2 px-3 pt-3 pb-2">' +
                '<i class="bi ' + t.icon + ' flex-shrink-0" style="font-size:1.1rem;margin-top:2px;"></i>' +
                '<div class="flex-grow-1 pe-1">' +
                  '<div class="lh-sm" style="font-size:0.88rem;font-weight:500;">' + esc(opts.message) + '</div>' +
                  (opts.hasUndo
                    ? '<button class="btn btn-sm rounded-pill px-3 py-1 mt-2 toast-undo-btn fw-semibold ' + (t.cw ? 'btn-light' : 'btn-outline-dark') + '" style="font-size:0.78rem;opacity:0.92;">' +
                        '<i class="bi bi-arrow-counterclockwise me-1"></i>Batalkan' +
                      '</button>'
                    : '') +
                '</div>' +
                '<button class="btn-close ' + (t.cw ? 'btn-close-white' : '') + ' flex-shrink-0" style="font-size:0.65rem;margin-top:3px;" aria-label="Tutup"></button>' +
              '</div>' +
              '<div class="toast-progress" style="background:' + t.bar + ';animation-duration:' + dur + 'ms;"></div>' +
            '</div>';

          // Newest at top
          container.insertBefore(el, container.firstChild);

          let timer;

          function done(confirm) {
            clearTimeout(timer);
            animateOut(el, confirm && opts.onConfirm ? opts.onConfirm : null);
          }

          // Close button: safe dismiss — for undo toasts this means "cancel delete"
          el.querySelector('.btn-close').addEventListener('click', function () { done(false); });

          if (opts.hasUndo) {
            el.querySelector('.toast-undo-btn').addEventListener('click', function () { done(false); });
            // Timer expiry = user didn't undo → confirm action
            timer = setTimeout(function () { done(true); }, dur);
          } else {
            timer = setTimeout(function () { done(false); }, dur);
          }

          return el;
        }

        return { init: init, show: show };
      })();
      /* ─────────────────────────────────────────────────────────────────── */

      /* ── Modal helpers ─────────────────────────────────────────────────── */
      function moveModalsToBody() {
        document.querySelectorAll('.modal:not([data-moved])').forEach(function (modal) {
          modal.setAttribute('data-moved', 'true');
          document.body.appendChild(modal);
          modal.style.position = 'fixed';
          modal.style.top = '0';
          modal.style.left = '0';
          modal.style.zIndex = '1060';
        });
      }

      /* ── Boot ──────────────────────────────────────────────────────────── */
      document.addEventListener('DOMContentLoaded', function () {
        ToastManager.init();

        // Render Django messages
        {% if messages %}{% for message in messages %}
        ToastManager.show({
          type: '{% if message.tags == "error" %}danger{% else %}{{ message.tags }}{% endif %}',
          message: '{{ message|escapejs }}'
        });
        {% endfor %}{% endif %}

        // Delete-form undo interception (capture phase = fires before any other submit)
        document.addEventListener('submit', function (e) {
          var form = e.target;
          if (!form.classList.contains('delete-confirm-form')) return;
          e.preventDefault();
          var name  = form.dataset.itemName  || 'item ini';
          var model = form.dataset.modelName ? '"' + form.dataset.modelName + '" ' : '';
          ToastManager.show({
            type: 'warning',
            message: model + '\u201c' + name + '\u201d akan dihapus permanen.',
            hasUndo: true,
            duration: 7000,
            onConfirm: function () { form.submit(); }
          });
        }, true);

        // Move modals to body
        moveModalsToBody();

        // Body overflow for modals
        document.querySelectorAll('.modal').forEach(function (m) {
          m.addEventListener('show.bs.modal',   function () { document.body.style.overflow = 'hidden'; });
          m.addEventListener('hidden.bs.modal', function () { document.body.style.overflow = ''; });
        });
      });
    </script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
