<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login - RSGM Backend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; width: 100%; max-width: 420px; }
  </style>
</head>
<body>

<div class="container d-flex justify-content-center">
  <div class="card login-card">
    <div class="card-header bg-primary text-white text-center py-4 border-0">
      <i class="bi bi-hospital fs-1 d-block mb-2"></i>
      <h4 class="mb-0 fw-bold">RS Gunung Maria</h4>
      <div class="small opacity-75">Admin Dashboard Portal</div>
    </div>
    <div class="card-body p-4 p-md-5">
      {% if messages %}
        {% for message in messages %}
           <div class="alert alert-{{ message.tags }} small py-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
      
      <form method="post" action="{% url 'backend_login' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label text-muted small fw-semibold">Username</label>
          <input type="text" name="username" class="form-control px-3 py-2 bg-light border-0" placeholder="Masukkan username" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label text-muted small fw-semibold">Password</label>
          <input type="password" name="password" class="form-control px-3 py-2 bg-light border-0" placeholder="••••••••" required>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary py-2 fw-bold">Login ke Sistem <i class="bi bi-arrow-right ms-1"></i></button>
        </div>
      </form>
      <div class="text-center mt-4">
        <a href="{% url 'home' %}" class="text-decoration-none text-muted small"><i class="bi bi-house me-1"></i>Kembali ke Website</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
